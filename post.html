<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章 · Younger.Van</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=13" />
  <script data-goatcounter="https://conan.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <!-- 代码高亮主题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
  <!-- MathJax 数学公式 -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
  <canvas id="starfield"></canvas>

  <nav class="topnav">
    <div class="brand">Younger.Van</div>
    <div class="tabs">
      <a href="index.html">主页</a>
      <a href="blog.html" class="active">博客</a>
      <a href="thoughts.html">想法</a>
    </div>
  </nav>

  <article class="article">
    <a href="blog.html" class="back">← 返回博客</a>
    <div id="content" class="markdown-body">
      <p style="color:#888">加载中…</p>
    </div>
  </article>

  <!-- 浮动目录 -->
  <aside id="toc" class="toc">
    <div class="toc-title">目录</div>
    <nav id="toc-list" class="toc-list"></nav>
  </aside>

  <!-- Markdown 解析 & 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      // 取 URL 中的 ?p=文件名
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('p') || 'rl-evolution';
      const safeSlug = slug.replace(/[^a-zA-Z0-9_-]/g, '');
      const baseDir = 'posts/';
      const mdPath = baseDir + safeSlug + '.md';
      const contentEl = document.getElementById('content');

      fetch(mdPath)
        .then((res) => {
          if (!res.ok) throw new Error('文章未找到');
          return res.text();
        })
        .then((md) => {
          contentEl.innerHTML = marked.parse(md);

          // 修正相对图片路径：md 中的相对路径应相对 posts/ 目录
          document.querySelectorAll('#content img').forEach((img) => {
            const raw = img.getAttribute('src') || '';
            const isAbsolute = /^(https?:)?\/\//i.test(raw) || raw.startsWith('/') || raw.startsWith('data:');
            if (!isAbsolute) {
              img.setAttribute('src', baseDir + raw);
            }
          });

          // 代码高亮
          document.querySelectorAll('#content pre code').forEach((block) => {
            try { hljs.highlightElement(block); } catch (e) {}
          });

          // 图片加载失败处理：隐藏裂图，替换为占位提示
          document.querySelectorAll('#content img').forEach((img) => {
            img.loading = 'lazy';
            img.addEventListener('error', function () {
              const ph = document.createElement('div');
              ph.className = 'img-fallback';
              ph.textContent = '🖼 图片暂不可用（来自私有图床）';
              this.replaceWith(ph);
            });
          });

          // 触发 MathJax 渲染
          if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise([contentEl]);
          }

          // ===== 生成目录（TOC）=====
          buildTOC();
        })
        .catch((err) => {
          contentEl.innerHTML = '<p style="color:#888">加载失败：' + err.message +
            '。<br/>提示：本地直接双击打开 html 会因浏览器安全策略无法 fetch，请用本地服务器或部署到 GitHub Pages 后访问。</p>';
        });
    })();

    // ===== 目录生成 + 滚动高亮 =====
    function buildTOC() {
      const headings = document.querySelectorAll('#content h1, #content h2, #content h3');
      const tocList = document.getElementById('toc-list');
      if (!headings.length || !tocList) return;

      // 给每个标题加 id，并生成目录项
      headings.forEach((h, i) => {
        if (!h.id) h.id = 'heading-' + i;
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.replace(/^#+\s*/, '');
        a.className = 'toc-link toc-' + h.tagName.toLowerCase();
        a.dataset.target = h.id;
        tocList.appendChild(a);
      });

      // 滚动时高亮当前章节
      const tocLinks = tocList.querySelectorAll('.toc-link');
      let ticking = false;
      function highlight() {
        const scrollY = window.scrollY + 120;
        let currentIdx = 0;
        headings.forEach((h, i) => {
          if (h.offsetTop <= scrollY) currentIdx = i;
        });
        tocLinks.forEach((l, i) => l.classList.toggle('active', i === currentIdx));
        ticking = false;
      }
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(highlight);
          ticking = true;
        }
      });
      highlight();
    }
  </script>
</body>
</html>
